name: SEC_13F_HOLDINGS_ANALYTICS
description: >-
  SEC 13F Holdings Analytics across Q4 2024 through Q4 2025. Contains STOCKS and ETFs only
  (options, bonds, calls, and puts are excluded). Q4 2025 is the LATEST quarter
  (as of December 31, 2025). Default to Q4 2025 when no quarter is specified.
  Share counts are split-adjusted so quarter-over-quarter comparisons are accurate.
tables:
  - name: HOLDINGS
    description: Institutional investor stock/ETF holdings with pivoted quarterly columns
    base_table:
      database: SEC_13F_ANALYTICS
      schema: SEMANTIC_LAYER
      table: HOLDINGS_CLEAN
    dimensions:
      - name: COMPANY_NAME
        description: Company name of the stock held (e.g. AMAZON COM INC, APPLE INC, NVIDIA CORPORATION)
        expr: COMPANY_NAME
        data_type: VARCHAR(500)
      - name: CUSIP
        description: CUSIP security identifier (unique per security)
        expr: CUSIP
        data_type: VARCHAR(27)
      - name: HEDGE_FUND_CIK
        description: SEC Central Index Key for the institutional investor / asset manager
        expr: HEDGE_FUND_CIK
        data_type: VARCHAR(20)
      - name: HEDGE_FUND_NAME
        description: >-
          Name of the 13F filer (hedge funds, asset managers, banks, insurance cos).
          e.g. BERKSHIRE HATHAWAY INC, BLACKROCK INC, VANGUARD GROUP INC.
        expr: HEDGE_FUND_NAME
        data_type: VARCHAR(500)
      - name: IS_ETF
        description: >-
          TRUE if the security is an ETF/index fund. Use IS_ETF = TRUE to filter ETFs
          (catches SPY, QQQ, VTI etc. that lack 'ETF' in TITLE_OF_CLASS).
        expr: IS_ETF
        data_type: BOOLEAN
        sample_values:
          - 'true'
          - 'false'
      - name: ETF_TICKER
        description: ETF ticker symbol (e.g. SPY, QQQ, VTI, IVV, VOO). Only populated for top ~60 ETFs.
        expr: ETF_TICKER
        data_type: VARCHAR(20)
        sample_values:
          - SPY
          - QQQ
          - VTI
          - IVV
          - VOO
      - name: ETF_CATEGORY
        description: >-
          ETF category (e.g. S&P 500, Nasdaq 100, Total Market, Technology, Growth).
          Only populated for top ~60 ETFs.
        expr: ETF_CATEGORY
        data_type: VARCHAR(100)
        sample_values:
          - S&P 500
          - Nasdaq 100
          - Total Market
          - Technology
          - Growth
          - Value
      - name: TITLE_OF_CLASS
        description: >-
          Security class as reported (COM, CL A, CL B, SHS). ETFs often lack 'ETF' here
          (e.g. SPY = 'TR UNIT'). Use IS_ETF = TRUE for ETF filtering.
        expr: TITLE_OF_CLASS
        data_type: VARCHAR(500)
        sample_values:
          - COM
          - CL A
          - SHS
    facts:
      - name: Y2024_Q4_SHARES
        description: Shares held in Q4 2024
        expr: Y2024_Q4_SHARES
        data_type: NUMBER(18,0)
      - name: Y2024_Q4_VALUE
        description: Reported value (USD in $000s) in Q4 2024
        expr: Y2024_Q4_VALUE
        data_type: NUMBER(25,3)
      - name: Y2025_Q1_SHARES
        description: Shares held in Q1 2025
        expr: Y2025_Q1_SHARES
        data_type: NUMBER(18,0)
      - name: Y2025_Q1_VALUE
        description: Reported value (USD in $000s) in Q1 2025
        expr: Y2025_Q1_VALUE
        data_type: NUMBER(25,3)
      - name: Y2025_Q2_SHARES
        description: Shares held in Q2 2025
        expr: Y2025_Q2_SHARES
        data_type: NUMBER(18,0)
      - name: Y2025_Q2_VALUE
        description: Reported value (USD in $000s) in Q2 2025
        expr: Y2025_Q2_VALUE
        data_type: NUMBER(25,3)
      - name: Y2025_Q3_SHARES
        description: Shares held in Q3 2025
        expr: Y2025_Q3_SHARES
        data_type: NUMBER(18,0)
      - name: Y2025_Q3_VALUE
        description: Reported value (USD in $000s) in Q3 2025
        expr: Y2025_Q3_VALUE
        data_type: NUMBER(25,3)
      - name: Y2025_Q4_SHARES
        description: Shares held in Q4 2025 (latest quarter, as of December 31, 2025)
        expr: Y2025_Q4_SHARES
        data_type: NUMBER(18,0)
      - name: Y2025_Q4_VALUE
        description: Reported value (USD in $000s) in Q4 2025 (latest quarter, as of December 31, 2025)
        expr: Y2025_Q4_VALUE
        data_type: NUMBER(25,3)
      - name: Q3_TO_Q4_SHARES_CHANGE
        description: Absolute change in shares from Q3 to Q4 2025
        expr: Y2025_Q4_SHARES - Y2025_Q3_SHARES
        data_type: NUMBER(19,0)
      - name: Q3_TO_Q4_SHARES_PCT_CHANGE
        description: Percentage change in shares from Q3 to Q4 2025 (already multiplied by 100, e.g. 5.2 means 5.2%)
        expr: ROUND((Y2025_Q4_SHARES - Y2025_Q3_SHARES) * 100.0 / NULLIF(Y2025_Q3_SHARES, 0), 2)
        data_type: NUMBER(28,2)
    filters:
      - name: ETF_ONLY
        description: Only ETF/index fund holdings
        expr: IS_ETF = TRUE
      - name: STOCKS_ONLY_NO_ETF
        description: Only individual stocks, excluding ETFs
        expr: IS_ETF = FALSE
      - name: ACTIVE_Q4_2025_POSITIONS
        description: Positions with reported values in Q4 2025 (latest quarter)
        expr: Y2025_Q4_VALUE IS NOT NULL
      - name: NEW_POSITIONS_Q4
        description: New positions in Q4 2025 with no Q3 holdings
        expr: Y2025_Q4_VALUE IS NOT NULL AND Y2025_Q3_VALUE IS NULL
      - name: EXITED_POSITIONS_Q3_Q4
        description: Positions completely exited between Q3 and Q4 2025
        expr: Y2025_Q3_VALUE IS NOT NULL AND Y2025_Q4_VALUE IS NULL
      - name: INCREASING_POSITIONS_Q3_Q4
        description: Positions where shares increased from Q3 to Q4 2025
        expr: Y2025_Q3_SHARES IS NOT NULL AND Y2025_Q4_SHARES IS NOT NULL AND Y2025_Q4_SHARES > Y2025_Q3_SHARES
      - name: DECREASING_POSITIONS_Q3_Q4
        description: Positions where shares decreased from Q3 to Q4 2025
        expr: Y2025_Q3_SHARES IS NOT NULL AND Y2025_Q4_SHARES IS NOT NULL AND Y2025_Q4_SHARES < Y2025_Q3_SHARES
      - name: ACTIVE_Q3_2025_POSITIONS
        description: Positions with reported values in Q3 2025
        expr: Y2025_Q3_VALUE IS NOT NULL
      - name: CONSECUTIVE_INCREASES_Q2_Q3_Q4
        description: Positions that increased in both Q2->Q3 and Q3->Q4 2025
        expr: Y2025_Q2_SHARES IS NOT NULL AND Y2025_Q3_SHARES IS NOT NULL AND Y2025_Q4_SHARES IS NOT NULL AND Y2025_Q3_SHARES > Y2025_Q2_SHARES AND Y2025_Q4_SHARES > Y2025_Q3_SHARES
      - name: CONSECUTIVE_DECREASES_Q2_Q3_Q4
        description: Positions that decreased in both Q2->Q3 and Q3->Q4 2025
        expr: Y2025_Q2_SHARES IS NOT NULL AND Y2025_Q3_SHARES IS NOT NULL AND Y2025_Q4_SHARES IS NOT NULL AND Y2025_Q3_SHARES < Y2025_Q2_SHARES AND Y2025_Q4_SHARES < Y2025_Q3_SHARES
    metrics:
      - name: TOTAL_AUM
        description: Total AUM (stocks and ETFs) for Q4 2025
        expr: SUM(Y2025_Q4_VALUE)
      - name: FUND_COUNT
        description: Count of distinct funds/managers holding a security
        expr: COUNT(DISTINCT HEDGE_FUND_CIK)
      - name: POSITION_COUNT
        description: Count of distinct securities (CUSIPs) held
        expr: COUNT(DISTINCT CUSIP)
    primary_key:
      columns:
        - HEDGE_FUND_CIK
        - CUSIP
verified_queries:
  # -- AUM & Fund Rankings --
  - name: Top 10 institutional managers by AUM
    question: As per the latest filing of Q4 2025, what is the total AUM in Billions for each of the top 10 institutional managers (Hedge Funds)?
    sql: |-
      SELECT hedge_fund_name, hedge_fund_cik,
        SUM(y2025_q4_value) / 1000000000 AS total_aum_billions,
        COUNT(DISTINCT cusip) AS num_positions
      FROM holdings
      WHERE y2025_q4_value > 0 AND hedge_fund_name IS NOT NULL
      GROUP BY hedge_fund_name, hedge_fund_cik
      ORDER BY total_aum_billions DESC NULLS LAST LIMIT 10
    verified_at: 1771717998
    verified_by: Sameer Shahzad
    use_as_onboarding_question: true
  - name: Bottom 100 institutional managers by AUM
    question: Show me the bottom 100 hedge funds by AUM
    sql: |-
      SELECT hedge_fund_name, hedge_fund_cik,
        SUM(y2025_q4_value) / 1000000000 AS total_aum_billions,
        COUNT(DISTINCT cusip) AS num_positions,
        'Q4 2025' AS period, '31 Dec 2025' AS portfolio_date
      FROM holdings
      WHERE y2025_q4_value > 0 AND hedge_fund_name IS NOT NULL
      GROUP BY hedge_fund_name, hedge_fund_cik
      ORDER BY total_aum_billions ASC NULLS LAST LIMIT 100
    verified_at: 1771864700
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
  - name: Berkshire Hathaway total AUM
    question: What is the total AUM for Berkshire Hathaway in Q4 2025?
    sql: |-
      SELECT hedge_fund_name,
        SUM(y2025_q4_value) AS total_portfolio_value_q4_2025,
        COUNT(DISTINCT cusip) AS total_positions,
        'Q4 2025' AS period, '31 Dec 2025' AS portfolio_date
      FROM holdings
      WHERE hedge_fund_name = 'BERKSHIRE HATHAWAY INC' AND y2025_q4_value IS NOT NULL
      GROUP BY hedge_fund_name
    verified_at: 1771863500
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
