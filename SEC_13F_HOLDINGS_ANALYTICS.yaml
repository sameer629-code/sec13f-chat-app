  - name: Berkshire Hathaway consecutive increases Q4 2024 to Q4 2025
    question: What are the top 5 stocks in which Berkshire Hathaway has continuously been increasing its holding position from Q4 2024 through Q4 2025?
    sql: |-
      SELECT company_name, title_of_class, cusip, hedge_fund_name,
        y2024_q4_shares AS q4_2024, y2025_q1_shares AS q1_2025,
        y2025_q2_shares AS q2_2025, y2025_q3_shares AS q3_2025,
        y2025_q4_shares AS q4_2025,
        y2025_q4_shares - y2024_q4_shares AS total_increase,
        ROUND(100.0 * (y2025_q4_shares - y2024_q4_shares) / NULLIF(y2024_q4_shares, 0), 2) AS pct_increase
      FROM holdings
      WHERE hedge_fund_name = 'BERKSHIRE HATHAWAY INC'
        AND y2024_q4_shares IS NOT NULL AND y2025_q1_shares IS NOT NULL
        AND y2025_q2_shares IS NOT NULL AND y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
        AND y2025_q1_shares > y2024_q4_shares AND y2025_q2_shares > y2025_q1_shares
        AND y2025_q3_shares > y2025_q2_shares AND y2025_q4_shares > y2025_q3_shares
        AND is_etf = FALSE
      ORDER BY total_increase DESC NULLS LAST LIMIT 5
    verified_at: 1771862432
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
  # -- Widely Held & Crowded --
  - name: Top 10 most widely held stocks
    question: As per the latest filings, what are the top 10 most widely held stocks?
    sql: |-
      SELECT company_name, COUNT(DISTINCT hedge_fund_cik) AS fund_count
      FROM holdings
      WHERE y2025_q4_value IS NOT NULL AND is_etf = FALSE
      GROUP BY company_name
      ORDER BY fund_count DESC NULLS LAST LIMIT 10
    verified_at: 1771856130
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
  - name: Most crowded stocks among hedge funds
    question: Which companies have the highest number of institutional investors holding their stock?
