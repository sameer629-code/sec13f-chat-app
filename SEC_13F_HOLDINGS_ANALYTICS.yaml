        SUM(CASE WHEN title_of_class = 'CAP STK CL C' THEN y2025_q4_shares ELSE 0 END) AS class_c,
        SUM(y2025_q4_shares) AS total_shares, SUM(y2025_q4_value) AS total_reported_value
      FROM holdings
      WHERE company_name = 'ALPHABET INC'
        AND title_of_class IN ('CAP STK CL A', 'CAP STK CL C') AND y2025_q4_value IS NOT NULL
      GROUP BY hedge_fund_name
      ORDER BY total_reported_value DESC NULLS LAST LIMIT 10
