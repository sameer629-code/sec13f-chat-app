  - name: Stocks under 10B accumulated by 3 plus funds
    question: Which stocks under $10B are being quietly accumulated by 3+ funds?
    sql: |-
      WITH stock_totals AS (
        SELECT company_name, cusip, SUM(y2025_q4_value) AS total_reported_value
        FROM holdings WHERE y2025_q4_value IS NOT NULL AND is_etf = FALSE
        GROUP BY company_name, cusip HAVING SUM(y2025_q4_value) < 10000000000
      ),
      accum AS (
        SELECT company_name, cusip, COUNT(DISTINCT hedge_fund_cik) AS num_funds
        FROM holdings
        WHERE y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
          AND y2025_q4_shares > y2025_q3_shares AND is_etf = FALSE
        GROUP BY company_name, cusip HAVING COUNT(DISTINCT hedge_fund_cik) >= 3
      )
      SELECT st.company_name, st.cusip, st.total_reported_value, a.num_funds
      FROM stock_totals st JOIN accum a ON st.company_name = a.company_name AND st.cusip = a.cusip
      ORDER BY a.num_funds DESC NULLS LAST, st.total_reported_value DESC NULLS LAST
