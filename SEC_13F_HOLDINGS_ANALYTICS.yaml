  # -- Consecutive Position Changes (STOCKS ONLY - IS_ETF = FALSE) --
  - name: Top 10 stocks with consecutive increases Q4 2024 through Q4 2025
    question: What are the top 10 stocks where hedge funds increased their share positions consecutively across Q4 2024, Q1 2025, Q2 2025, Q3 2025, and Q4 2025?
    sql: |-
      SELECT company_name, cusip, title_of_class,
        COUNT(DISTINCT hedge_fund_cik) AS num_funds_increasing,
        'Q4 2024 - Q4 2025' AS period
      FROM holdings
      WHERE y2024_q4_shares IS NOT NULL AND y2025_q1_shares IS NOT NULL
        AND y2025_q2_shares IS NOT NULL AND y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
        AND y2025_q1_shares > y2024_q4_shares AND y2025_q2_shares > y2025_q1_shares
        AND y2025_q3_shares > y2025_q2_shares AND y2025_q4_shares > y2025_q3_shares
        AND is_etf = FALSE
      GROUP BY company_name, cusip, title_of_class
      ORDER BY num_funds_increasing DESC NULLS LAST LIMIT 10
    verified_at: 1771868000
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
  - name: Top 5 stocks with consecutive increases in Q3 and Q4 2025
    question: What are the top 5 stocks where the most hedge funds/institutional asset managers increased their share positions in both Q2 to Q3 AND Q3 to Q4 2025?
    sql: |-
      SELECT company_name, cusip, title_of_class,
        COUNT(DISTINCT hedge_fund_cik) AS num_funds_increasing,
        'Q2->Q3->Q4 2025' AS period
      FROM holdings
      WHERE y2025_q2_shares IS NOT NULL AND y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
        AND y2025_q3_shares > y2025_q2_shares
        AND y2025_q4_shares > y2025_q3_shares
        AND is_etf = FALSE
      GROUP BY company_name, cusip, title_of_class
      ORDER BY num_funds_increasing DESC NULLS LAST LIMIT 5
    verified_at: 1772600000
    verified_by: Sameer Shahzad
    use_as_onboarding_question: true
  # -- Position Changes --
  - name: Top 25 stocks hedge funds decreased last quarter
    question: In Q3 to Q4 2025 what are the top 25 stocks hedge funds decreased?
    sql: |-
      WITH top_stocks AS (
        SELECT company_name, cusip,
          COUNT(DISTINCT hedge_fund_cik) AS num_funds_decreased,
          ROW_NUMBER() OVER (ORDER BY COUNT(DISTINCT hedge_fund_cik) DESC) AS rnk
        FROM holdings
        WHERE y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
          AND y2025_q4_shares < y2025_q3_shares AND is_etf = FALSE
        GROUP BY company_name, cusip
        LIMIT 25
      )
      SELECT ts.rnk, h.company_name, h.cusip, ts.num_funds_decreased,
        h.hedge_fund_name, h.y2025_q3_shares AS q3_shares, h.y2025_q4_shares AS q4_shares,
        h.y2025_q3_shares - h.y2025_q4_shares AS shares_decreased
      FROM holdings h JOIN top_stocks ts ON h.company_name = ts.company_name AND h.cusip = ts.cusip
      WHERE h.y2025_q3_shares IS NOT NULL AND h.y2025_q4_shares IS NOT NULL
        AND h.y2025_q4_shares < h.y2025_q3_shares AND h.is_etf = FALSE
      ORDER BY ts.rnk, shares_decreased DESC NULLS LAST
