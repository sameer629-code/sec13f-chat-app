  - name: Snowflake increasing holders
    question: Which funds are constantly increasing their Snowflake stock holdings in Q2, Q3, and Q4 2025?
    sql: |-
      SELECT hedge_fund_name, company_name, cusip, title_of_class,
        y2025_q2_shares AS q2, y2025_q3_shares AS q3, y2025_q4_shares AS q4,
        ROUND(100.0 * (y2025_q4_shares - y2025_q2_shares) / NULLIF(y2025_q2_shares, 0), 2) AS pct_increase
