      WHERE company_name ILIKE '%SNOWFLAKE%'
        AND y2025_q2_shares IS NOT NULL AND y2025_q3_shares IS NOT NULL AND y2025_q4_shares IS NOT NULL
        AND y2025_q3_shares > y2025_q2_shares AND y2025_q4_shares > y2025_q3_shares
