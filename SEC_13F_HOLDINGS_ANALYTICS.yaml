  - name: Stocks with 10x increase in institutional holders
    question: Which stocks had a 10x increase in institutional holders in one quarter?
    sql: |-
      WITH q3_holders AS (
        SELECT company_name, cusip, COUNT(DISTINCT hedge_fund_cik) AS q3_count
        FROM holdings WHERE y2025_q3_value IS NOT NULL AND is_etf = FALSE
        GROUP BY company_name, cusip
      ),
      q4_holders AS (
        SELECT company_name, cusip, COUNT(DISTINCT hedge_fund_cik) AS q4_count
        FROM holdings WHERE y2025_q4_value IS NOT NULL AND is_etf = FALSE
        GROUP BY company_name, cusip
      )
      SELECT q4.company_name, q4.cusip,
        COALESCE(q3.q3_count, 0) AS q3_holders,
        q4.q4_count AS q4_holders,
        q4.q4_count - COALESCE(q3.q3_count, 0) AS new_holders,
        CASE WHEN COALESCE(q3.q3_count, 0) > 0
          THEN ROUND(q4.q4_count::FLOAT / q3.q3_count, 1)
          ELSE NULL END AS growth_multiple,
        'Q3 -> Q4 2025' AS period
      FROM q4_holders q4
      LEFT JOIN q3_holders q3 ON q4.company_name = q3.company_name AND q4.cusip = q3.cusip
      WHERE COALESCE(q3.q3_count, 0) > 0
        AND q4.q4_count >= 10 * q3.q3_count
      ORDER BY new_holders DESC NULLS LAST LIMIT 25
