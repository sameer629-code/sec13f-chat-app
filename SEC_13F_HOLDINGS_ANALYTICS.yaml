module_custom_instructions:
  sql_generation: |-
    === RULE 1 - STOCK vs ETF FILTERING (HIGHEST PRIORITY) ===
    EVERY query MUST apply the correct IS_ETF filter based on what the user asked:

    A) User says "stocks", "top stocks", "public stocks", "companies", "shares",
       "stock positions", or "increased/decreased stocks":
       -> ALWAYS add WHERE IS_ETF = FALSE. This EXCLUDES ETFs. NO EXCEPTIONS.

    B) User says "holdings" (e.g. "show holdings of X", "what does X own"):
       -> Do NOT filter on IS_ETF. Show BOTH stocks and ETFs together.

    C) User says "ETFs", "index funds", or a specific ETF name/ticker:
       -> Use WHERE IS_ETF = TRUE (or etf_ticker = 'SPY', etf_category = 'S&P 500').

    D) User says "stocks and ETFs" or "both stocks and ETFs":
       -> Include IS_ETF in SELECT, add CASE WHEN IS_ETF THEN 'ETF' ELSE 'Stock' END AS security_type_label,
         ORDER BY IS_ETF ASC (stocks first, then ETFs).

    REMEMBER: "top 10 stocks" means IS_ETF = FALSE. "top 10 holdings" means no filter.
    =============================================================

    Q4 2025 is the LATEST quarter (as of December 31, 2025). Default to Q4 2025 when no quarter specified.

    HOLDINGS OUTPUT FORMAT (MANDATORY for single-quarter holdings queries):
    1. Always include TITLE_OF_CLASS in SELECT.
    2. Add literal columns: 'Q4 2025' AS PERIOD, '31 Dec 2025' AS PORTFOLIO_DATE (adjust per quarter).
    3. Alias value columns as REPORTED_VALUE. Example: y2025_q4_value AS reported_value

    Quarter end dates: Q4 2024 -> 31 Dec 2024, Q1 2025 -> 31 Mar 2025, Q2 2025 -> 30 Jun 2025,
    Q3 2025 -> 30 Sep 2025, Q4 2025 -> 31 Dec 2025.

    FUND vs COMPANY DISAMBIGUATION:
    HEDGE_FUND_NAME = the 13F filer (fund, asset manager, bank, etc.).
    COMPANY_NAME = the stock/company held.
    "Show holdings of X" / "what does X own" -> filter on HEDGE_FUND_NAME.
    "Who holds X" / "investors in X" -> filter on COMPANY_NAME.

    FUND NAME MATCHING (always use HEDGE_FUND_NAME):
    Berkshire Hathaway -> hedge_fund_name = 'BERKSHIRE HATHAWAY INC'
    BlackRock -> hedge_fund_name ILIKE '%BlackRock%'
    Bridgewater -> hedge_fund_name ILIKE '%BRIDGEWATER%'
    Citadel -> hedge_fund_name ILIKE '%CITADEL ADVISORS%'
    Vanguard -> hedge_fund_name ILIKE '%VANGUARD%'
    Bank of America -> hedge_fund_name ILIKE '%BANK OF AMERICA%'
    Morgan Stanley -> hedge_fund_name ILIKE '%MORGAN STANLEY%'
    Goldman Sachs -> hedge_fund_name ILIKE '%GOLDMAN SACHS%'
    For unknown funds: hedge_fund_name ILIKE '%<name>%'

    COMPANY NAME MATCHING:
    Amazon -> company_name = 'AMAZON COM INC'
    Apple -> company_name = 'APPLE INC'
    NVIDIA -> company_name = 'NVIDIA CORPORATION'
    Tesla -> company_name = 'TESLA INC'
    Meta -> company_name = 'META PLATFORMS INC'
    Microsoft -> company_name = 'MICROSOFT CORP'
    Alphabet -> company_name = 'ALPHABET INC' (two share classes: CL A and CL C)
    Snowflake -> company_name ILIKE '%SNOWFLAKE%'

    FUND RANKING QUERIES (top N, bottom N, largest, smallest funds):
    - ALWAYS add: WHERE y2025_q4_value > 0 AND hedge_fund_name IS NOT NULL
    - This excludes inactive filers and rows with missing fund names.
    - For "bottom" / "smallest" funds: use ORDER BY total_aum ASC with the filters above.
    - For "top" / "largest" funds: use ORDER BY total_aum DESC with the filters above.
    - NEVER return funds with 0 AUM or empty/NULL names in ranking results.

    STOCK SPLIT ADJUSTMENT:
    - Share columns are already split-adjusted in the data. No manual adjustment needed.
    - Quarter-over-quarter share comparisons are safe and accurate.

    CONSECUTIVE POSITION CHANGE QUERIES (top N stocks funds increased/decreased):
    - "Increased in both Q2 to Q3 AND Q3 to Q4" or "consecutively in Q3 and Q4" = TWO transitions:
      Requires: y2025_q3_shares > y2025_q2_shares AND y2025_q4_shares > y2025_q3_shares
    - "Increased in Q2, Q3, and Q4" = THREE transitions: Q1->Q2, Q2->Q3, Q3->Q4.
    - "Increased from Q4 2024 through Q4 2025" = FOUR transitions: Q4'24->Q1, Q1->Q2, Q2->Q3, Q3->Q4.
    - For follow-up questions about a specific stock from these results, ALWAYS keep
      the same consecutive filters. E.g. if user first asks about Q2->Q3->Q4 top stocks
      and then says "more details on Amazon", apply the SAME Q2->Q3 AND Q3->Q4 conditions.
    - GROUP BY must ONLY contain company_name, cusip, title_of_class.
      NEVER add shares or value columns to GROUP BY - that breaks the COUNT aggregation.
    - Use COUNT(DISTINCT hedge_fund_cik) AS num_funds_increasing to count how many funds increased.
    - NEVER include VALUE columns (y20xx_qx_value, total_q4_value, SUM of value) in these queries.
      Position increase/decrease is about SHARES, not market value. Showing values confuses
      users when a stock price drops but shares increased. Only show num_funds_increasing.
    - Follow the verified query patterns EXACTLY - do NOT add extra columns to SELECT or GROUP BY.

    PERCENTAGE CALCULATIONS:
    - ALWAYS multiply by 100 to express as a true percentage.
    - Correct formula: ROUND((new - old) * 100.0 / NULLIF(old, 0), 2)
    - Example: a change from 100 to 105 shares = ROUND((105-100)*100.0/100, 2) = 5.00 (meaning 5%)
    - NEVER return raw decimals like 0.05; always return 5.00.
    - Use the built-in fact Q3_TO_Q4_SHARES_PCT_CHANGE when available (it already applies * 100).

    GENERAL RULES:
    - Position changes: group by company_name AND cusip, use SHARES not VALUE columns
    - "Widely held": COUNT(DISTINCT hedge_fund_cik)
    - "How many stocks": COUNT(DISTINCT cusip)
    - Default limit: 1000 results unless user specifies
    - ALWAYS use NULLS LAST on ORDER BY DESC to avoid NULL values appearing at the top