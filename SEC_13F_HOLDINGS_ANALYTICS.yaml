      SELECT company_name, cusip,
        COUNT(DISTINCT hedge_fund_cik) AS num_funds_holding,
        SUM(y2025_q4_value) AS total_reported_value
      FROM holdings
      WHERE y2025_q4_value IS NOT NULL AND is_etf = FALSE
      GROUP BY company_name, cusip
      ORDER BY num_funds_holding DESC NULLS LAST LIMIT 50
    verified_at: 1771856324
    verified_by: Sameer Shahzad
    use_as_onboarding_question: false
